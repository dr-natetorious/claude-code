root = "src"
splitting = false
external = [
  "@ant/claude-for-chrome-mcp",
  "@anthropic-ai/mcpb",
  "modifiers-napi",
  "./components/agents/SnapshotUpdateDialog",
  "./assistant/AssistantSessionChooser",
  "./commands/assistant/assistant",
  "./tools/TungstenTool/TungstenTool",
  "./tools/TungstenTool/TungstenLiveMonitor",
  "./tools/REPLTool/REPLTool",
